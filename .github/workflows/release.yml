name: Release

# On a version tag (v*), build the bundle and attach it to a GitHub release —
# this is the artifact HACS downloads when a user installs/updates the cards.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/simui-lovelace.js
          generate_release_notes: true
