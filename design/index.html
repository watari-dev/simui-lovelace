<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SimUI Cards — design library</title>
<style>
:root { color-scheme: dark; }
html, body { margin: 0; background: #0a0a0c; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #ededed; }
header { padding: 30px 30px 8px; }
header h1 { font-size: 19px; font-weight: 700; letter-spacing: -.2px; margin: 0 0 4px; }
header p { color: #8a8a8a; font-size: 13px; margin: 0; }
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 18px; padding: 22px 30px 40px; }
.g-item { margin: 0; border: 1px solid rgba(255,255,255,.07); border-radius: 16px; overflow: hidden; background: #0e0e10; }
.g-item figcaption { display: flex; justify-content: space-between; align-items: baseline; padding: 11px 14px; font-size: 12.5px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.06); }
.g-item figcaption span { color: #6f6f73; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.g-item iframe { width: 100%; height: 340px; border: 0; display: block; background: #0e0e10; }
</style>
</head>
<body>
<header><h1>SimUI Cards — design library</h1><p>10 components · grounded in UI-Lovelace-Minimalist. Built from the real card CSS + live-rendered DOM.</p></header>
<div class="gallery">
<figure class="g-item"><figcaption>Colour & geometry <span>Foundations</span></figcaption><iframe src="foundations/tokens.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Light <span>Entity tiles</span></figcaption><iframe src="components/light.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Climate <span>Entity tiles</span></figcaption><iframe src="components/climate.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Sensor <span>Entity tiles</span></figcaption><iframe src="components/sensor.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Cover <span>Entity tiles</span></figcaption><iframe src="components/cover.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Lock <span>Entity tiles</span></figcaption><iframe src="components/lock.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Media <span>Media & status</span></figcaption><iframe src="components/media.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Chips <span>Media & status</span></figcaption><iframe src="components/chips.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Graph <span>Data viz</span></figcaption><iframe src="components/graph.html" loading="lazy"></iframe></figure>
<figure class="g-item"><figcaption>Energy Flow <span>Data viz</span></figcaption><iframe src="components/energy-flow.html" loading="lazy"></iframe></figure>
</div>
</body>
</html>
