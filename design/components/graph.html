<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SimUI Cards — Graph</title>
<style>

:root { color-scheme: dark; }
html, body { margin: 0; background: #0e0e10; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
.ds-wrap { padding: 26px 26px 34px; max-width: 820px; margin: 0 auto; }
.ds-eyebrow { color: #6f6f73; font-size: 10.5px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin: 0 0 6px; }
.ds-title { color: #ededed; font-size: 17px; font-weight: 700; letter-spacing: -.2px; margin: 0 0 5px; }
.ds-desc { color: #8a8a8a; font-size: 12.5px; line-height: 1.5; margin: 0 0 22px; max-width: 56ch; }
.ds-grid { display: grid; gap: 16px; }
.ds-cell { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.ds-label { color: #6f6f73; font-size: 10px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; padding-left: 3px; }

.ds-grid { grid-template-columns:minmax(0,340px); }

/* ── SimUI card styles (src/styles.css, :host → .simui-scope) ─────────────── */
/* SimUI Cards — the UI-Lovelace-Minimalist material, faithfully.
   Each card renders in its own shadow root. Colour tokens are RGB *triplets* (not hex) so
   a tint can be used at any alpha — `rgb(var(--warm))` for solid, `rgba(var(--warm), .2)`
   for the icon-cell wash — exactly like ULM's `rgba(var(--color-yellow), …)`. Each token
   inherits the user's ULM theme variable when present (so an installed Minimalist theme
   recolours the cards for free) and falls back to ULM's own dark-mode value otherwise.
   CSS custom properties cross the shadow boundary, so the theme still reaches us; nothing
   we declare leaks back out. */
.simui-scope {
  --surface: var(--ha-card-background, var(--card-background-color, #1d1d1d));
  --text: var(--primary-text-color, #dddddd);

  /* state colours — RGB triplets, ULM dark-mode palette */
  /* The dim base (off icons / cells / gridlines). Inherit ULM's --color-theme; else HA's
     per-theme text triplet (dark on a light theme, light on a dark theme) so it stays
     visible without ULM; else a mid-grey that reads on both light and dark surfaces. */
  --theme: var(--color-theme, var(--rgb-primary-text-color, 127, 127, 127));
  --warm: var(--color-yellow, 252, 214, 99);     /* lights / switches / on */
  --cool: var(--color-blue, 137, 179, 248);      /* cooling / fan / covers / media / active */
  --up: var(--color-green, 128, 201, 148);       /* good / secure / charging */
  --down: var(--color-red, 241, 139, 130);       /* alert / fault / unavailable — NOT "active" */
  --heat: var(--color-orange, 240, 150, 90);     /* heating (warm/active, not a fault) */
  --grey: var(--color-grey, 187, 187, 187);      /* neutral / at-rest / unknown */

  /* ULM geometry */
  --r-surface: var(--border-radius, 20px);
  --bezel: var(--box-shadow, 0 2px 4px 0 rgba(0, 0, 0, 0.16));
  --shadow-hover: 0 5px 14px 0 rgba(0, 0, 0, 0.26);

  display: block;
}
.simui-scope * { box-sizing: border-box; }

/* ── The Minimalist entity tile ───────────────────────────────────────────────────
   ULM's signature card: a 42px icon disc on the left, the name + a dim state line
   stacked to its right, on a flat dark surface with a soft drop shadow. The COLOUR
   lives in the icon disc (cell wash at .2, icon at full), not the whole card — that's
   the read that makes it feel Minimalist rather than a tinted tile. */
.simui-tile {
  --tile-tint: var(--warm);
  position: relative;
  display: grid;
  grid-template-columns: min-content 1fr;
  grid-template-areas: 'ic name' 'ic state';
  grid-template-rows: auto auto;
  align-items: center;
  align-content: center;
  column-gap: 12px;
  padding: 10px;
  border-radius: var(--r-surface);
  background: var(--surface);
  box-shadow: var(--bezel);
  cursor: pointer;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.18s ease, box-shadow 0.18s ease;
  font-family: var(--paper-font-body1_-_font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
  color: var(--text);
}
.simui-tile.is-dragging {
  background: rgba(var(--tile-tint), 0.1); /* fallback for browsers without color-mix (iOS < 16.2) */
  background: color-mix(in srgb, rgb(var(--tile-tint)) 8%, var(--surface));
  box-shadow: var(--shadow-hover);
}
.simui-tile.is-unavailable { cursor: default; touch-action: auto; }
.simui-tile.is-unavailable .simui-tile-name,
.simui-tile.is-unavailable .simui-tile-state { opacity: 0.5; }
.simui-tile:focus-visible {
  outline: 2px solid rgba(var(--tile-tint), 0.6);
  outline-offset: 1px;
}

/* the icon disc — the toggle, and where all the colour is */
.simui-tile-ic {
  grid-area: ic;
  place-self: center;
  display: grid;
  place-items: center;
  width: 36px;
  height: 36px;
  padding: 0;
  border: none;
  border-radius: 50%;
  background: rgba(var(--theme), 0.05);
  color: rgba(var(--theme), 0.2);
  cursor: pointer;
  transition: background 0.18s ease, color 0.18s ease;
}
button.simui-tile-ic { font: inherit; }
.simui-tile.is-on .simui-tile-ic {
  background: rgba(var(--tile-tint), 0.2);
  color: rgb(var(--tile-tint));
}
.simui-tile-ic:hover { background: rgba(var(--tile-tint), 0.28); }
.simui-tile.is-unavailable .simui-tile-ic:hover { background: rgba(var(--theme), 0.05); }
button.simui-tile-ic:focus-visible { outline: 2px solid rgba(var(--tile-tint), 0.6); outline-offset: 2px; }

/* name (bold) + state line (dim), hugging the icon's vertical centre */
.simui-tile-name {
  grid-area: name;
  align-self: end;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* sensor cards put the value in the name slot — give it tabular figures */
.simui-tile-value { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
.simui-tile-state {
  grid-area: state;
  align-self: start;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  opacity: 0.6;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

@media (prefers-reduced-motion: reduce) {
  .simui-tile, .simui-tile-ic, .simui-graph-range { transition: none; }
}

/* ── History graph card ───────────────────────────────────────────────────────
   ULM material with a TradingView-flavoured chart: thin line, soft gradient area,
   hairline gridlines, crosshair readout, a range toggle + min/avg/max. */
.simui-graph {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px;
  border-radius: var(--r-surface);
  background: var(--surface);
  box-shadow: var(--bezel);
  color: var(--text);
  font-family: var(--paper-font-body1_-_font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
}
.simui-graph-head {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  border-radius: 8px;
}
.simui-graph-head:focus-visible { outline: 2px solid rgba(var(--tile-tint), 0.6); outline-offset: 2px; }
.simui-graph-ic {
  display: grid;
  place-items: center;
  flex: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(var(--tile-tint), 0.2);
  color: rgb(var(--tile-tint));
}
.simui-graph-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.simui-graph-value {
  margin-left: auto;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
}

.simui-graph-chart { position: relative; width: 100%; height: 132px; }
.simui-graph-empty { position: absolute; inset: 0; display: grid; place-items: center; font-size: 12px; opacity: 0.4; }

.simui-graph-svg { display: block; width: 100%; height: 100%; overflow: visible; }
.simui-graph-grid { stroke: rgba(var(--theme), 0.14); stroke-width: 1; shape-rendering: crispEdges; }
.simui-graph-line { fill: none; stroke: rgb(var(--tile-tint)); stroke-linejoin: round; stroke-linecap: round; }
.simui-graph-end { fill: rgb(var(--tile-tint)); stroke: var(--surface); stroke-width: 1.5; }
.simui-graph-axis {
  fill: rgba(var(--theme), 0.5);
  font-size: 10px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum';
  /* a surface-coloured halo so value labels stay legible where they cross the line / fill */
  paint-order: stroke;
  stroke: var(--surface);
  stroke-width: 2px;
  stroke-linejoin: round;
}
.simui-graph-cross { stroke: rgba(var(--theme), 0.35); stroke-width: 1; stroke-dasharray: 3 3; }
.simui-graph-dot { fill: rgb(var(--tile-tint)); stroke: var(--surface); stroke-width: 2; }

.simui-graph-tip {
  position: absolute;
  top: -2px;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 4px 7px;
  border-radius: 8px;
  background: var(--surface); /* fallback for browsers without color-mix (iOS < 16.2) */
  background: color-mix(in srgb, var(--surface) 84%, #000);
  box-shadow: var(--bezel);
  white-space: nowrap;
  z-index: 2;
}
.simui-graph-tip-v { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.simui-graph-tip-u { font-size: 11px; opacity: 0.6; margin-left: 1px; }
.simui-graph-tip-t { font-size: 10px; opacity: 0.6; }

.simui-graph-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 22px; }
.simui-graph-ranges { display: flex; gap: 3px; }
.simui-graph-range {
  font: inherit;
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
  padding: 4px 8px;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  background: transparent;
  color: var(--text);
  opacity: 0.4;
  transition: opacity 0.15s ease, background 0.15s ease;
}
.simui-graph-range:hover { opacity: 0.7; }
.simui-graph-range.on { opacity: 1; background: rgba(var(--tile-tint), 0.16); color: rgb(var(--tile-tint)); }
.simui-graph-stats { display: flex; gap: 11px; font-size: 11px; opacity: 0.6; font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
.simui-graph-stats b { font-weight: 700; }

/* ── Media player card ─────────────────────────────────────────────────────────
   ULM material: album art (or a music disc) + title/artist + transport controls. */
.simui-media {
  display: grid;
  grid-template-columns: min-content minmax(0, 1fr) auto;
  grid-template-areas: 'art body ctrl';
  align-items: center;
  column-gap: 12px;
  padding: 12px;
  border-radius: var(--r-surface);
  background: var(--surface);
  box-shadow: var(--bezel);
  color: var(--text);
  cursor: pointer;
  font-family: var(--paper-font-body1_-_font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
}
.simui-media:focus-visible { outline: 2px solid rgba(var(--tile-tint), 0.6); outline-offset: 1px; }
.simui-media.is-unavailable .simui-media-title,
.simui-media.is-unavailable .simui-media-sub { opacity: 0.5; }

.simui-media-art {
  grid-area: art;
  flex: none;
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background-size: cover;
  background-position: center;
  background-color: rgba(var(--theme), 0.05);
  color: rgba(var(--theme), 0.2);
}
.simui-media.is-on .simui-media-art { background-color: rgba(var(--tile-tint), 0.2); color: rgb(var(--tile-tint)); }

.simui-media-body { grid-area: body; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.simui-media-title { font-size: 14px; font-weight: 700; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.simui-media-sub { font-size: 12px; font-weight: 600; opacity: 0.6; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.simui-media-ctrl { grid-area: ctrl; display: flex; align-items: center; gap: 1px; }
.simui-media-btn {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  padding: 0;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: var(--text);
  opacity: 0.7;
  cursor: pointer;
  transition: opacity 0.15s ease, background 0.15s ease;
}
.simui-media-btn:hover { opacity: 1; background: rgba(var(--theme), 0.08); }
.simui-media-btn:focus-visible { outline: 2px solid rgba(var(--tile-tint), 0.6); outline-offset: 2px; }
.simui-media-btn.primary { color: rgb(var(--tile-tint)); opacity: 1; }

@media (prefers-reduced-motion: reduce) {
  .simui-media-btn { transition: none; }
}

/* ── Status chips ──────────────────────────────────────────────────────────────
   A wrapping row of compact pills (ULM chip: 36px tall, soft shadow) — icon tinted
   by state + a short value/state label. The card itself is transparent. */
.simui-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  font-family: var(--paper-font-body1_-_font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
}
.simui-chips-empty {
  min-height: 36px;
  padding: 0 12px;
  font-size: 13px;
  color: var(--text);
  opacity: 0.4;
}
.simui-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 12px 0 10px;
  border: none;
  border-radius: 18px;
  background: var(--surface);
  box-shadow: var(--bezel);
  color: var(--text);
  cursor: pointer;
  font: inherit;
  white-space: nowrap;
  transition: background 0.15s ease;
}
.simui-chip:hover { background: color-mix(in srgb, rgb(var(--tile-tint)) 8%, var(--surface)); }
.simui-chip:focus-visible { outline: 2px solid rgba(var(--tile-tint), 0.6); outline-offset: 2px; }
.simui-chip.is-unavailable { opacity: 0.5; }
.simui-chip-ic { display: grid; place-items: center; flex: none; color: rgba(var(--theme), 0.45); }
.simui-chip.is-on .simui-chip-ic { color: rgb(var(--tile-tint)); }
.simui-chip-label { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }

@media (prefers-reduced-motion: reduce) {
  .simui-chip { transition: none; }
}

/* ── Energy-flow card ──────────────────────────────────────────────────────────
   A Powerwall-style diagram: Solar / Grid / Battery on a cross around the Home hub,
   wires that colour + animate only when power crosses them. Ported from the panel. */
.simui-eflow {
  position: relative;
  width: 100%;
  max-width: 440px;
  margin-inline: auto;
  background: var(--surface);
  border-radius: var(--r-surface);
  padding: 8px;
  box-shadow: var(--bezel);
  aspect-ratio: 260 / 180;
  overflow: hidden;
  font-family: var(--paper-font-body1_-_font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
}
.simui-eflow-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

.simui-eflow-wire { stroke: rgba(var(--theme), 0.15); stroke-width: 2; stroke-linecap: round; fill: none; }
/* Active wire: a calm, solid colour overlay in the flow colour — no marching-ants loop.
   Direction is read from the layout (solar feeds in; grid/battery branch out), not motion. */
.simui-eflow-edge.is-active .simui-eflow-pulse {
  stroke: rgb(var(--eflow-edge, var(--cool)));
  stroke-width: 2.5;
  stroke-linecap: round;
  fill: none;
  opacity: 0.95;
}
.simui-eflow-edge.is-dead .simui-eflow-wire { opacity: 0.4; }

.simui-eflow-nodes { position: absolute; inset: 0; pointer-events: none; }
.simui-eflow-node {
  position: absolute;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  width: 60px;
  padding: 0;
  border: none;
  background: none;
  text-align: center;
  color: var(--text);
  pointer-events: auto;
  cursor: pointer;
  font: inherit;
}
.simui-eflow-node:disabled { cursor: default; }
.simui-eflow-node-ic {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 38px;
  border-radius: 12px;
  color: rgb(var(--eflow-node, var(--grey)));
  background: color-mix(in srgb, rgb(var(--eflow-node, var(--theme))) 9%, var(--surface));
}
.simui-eflow-node.role-load .simui-eflow-node-ic { width: 42px; height: 42px; border-radius: 13px; }
.simui-eflow-node:focus-visible { outline: none; }
.simui-eflow-node:focus-visible .simui-eflow-node-ic { outline: 2px solid rgb(var(--eflow-node, var(--cool))); outline-offset: 2px; }
.simui-eflow-node-label { font-size: 10px; font-weight: 500; letter-spacing: 0.2px; color: rgba(var(--theme), 0.55); white-space: nowrap; }
.simui-eflow-node-val { font-size: 14px; font-weight: 600; line-height: 1.05; color: var(--text); font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; white-space: nowrap; }
.simui-eflow-node-unit { font-size: 9px; font-weight: 500; color: rgba(var(--theme), 0.55); margin-left: 1px; }
.simui-eflow-node-soc { font-size: 9px; font-weight: 600; color: rgb(var(--cool)); font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
.simui-eflow-node.is-dead { opacity: 0.42; }
.simui-eflow-node.is-dead .simui-eflow-node-ic { color: rgba(var(--theme), 0.5); background: color-mix(in srgb, rgb(var(--theme)) 4%, var(--surface)); }


</style>
</head>
<body>
<div class="ds-wrap">
<p class="ds-eyebrow">SimUI Cards</p>
<p class="ds-title">Graph</p>
<p class="ds-desc">A sensor-history chart — thin line, soft gradient fill, hairline gridlines, axis labels, a range toggle (1h / 12h / 24h / 7d) and min / avg / max. Custom-rendered SVG, no chart library.</p>
